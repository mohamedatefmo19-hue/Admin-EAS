<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAS | Egyptian Aviation Services - Passenger Information Display</title>
    <style>
        :root {
            --bg-deep: #0b111e;
            --bg-surface: rgba(16, 24, 40, 0.85);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #c8a44e;
            --gold-light: #dfc278;
            --gold-dim: #a68a3e;
            --text-primary: #eaedf2;
            --text-secondary: #b0b8c5;
            --text-muted: #7a8291;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 40px rgba(200, 164, 78, 0.1);
            --radius-3xl: 24px;
            --radius-xl: 16px;
            --radius-lg: 12px;
            --font-en: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-ar: 'Noto Naskh Arabic', 'Tahoma', 'Segoe UI', sans-serif;
            --header-height: 76px;
            --footer-height: 48px;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --bg-deep: #eef2f7;
            --bg-surface: rgba(255, 255, 255, 0.7);
            --glass: rgba(255, 255, 255, 0.4);
            --glass-hover: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-primary: #141a24;
            --text-secondary: #2d3540;
            --text-muted: #5b6470;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.12), 0 0 40px rgba(200, 164, 78, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-en);
            background: var(--bg-deep);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
            transition: background var(--transition), color var(--transition);
        }

        body.rtl {
            direction: rtl;
            font-family: var(--font-ar);
        }

        /* Loading Screen – subtle fade */
        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #060b15;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            opacity: 1;
            visibility: visible;
        }
        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #loading-screen .load-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: gentlePulse 2s ease-in-out infinite;
        }
        @keyframes gentlePulse {
            0%,
            100% {
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
        }
        #loading-screen .load-logo img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        #loading-screen .load-text {
            font-size: 13px;
            letter-spacing: 0.35em;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Background atmosphere */
        #bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        #bg-layer .bg-radial {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 20%, rgba(30, 55, 90, 0.4) 0%, transparent 55%),
                radial-gradient(circle at 70% 60%, rgba(20, 45, 70, 0.35) 0%, transparent 55%),
                linear-gradient(180deg, #0d1422 0%, #101a2a 50%, #0a101c 100%);
            transition: background var(--transition);
        }
        body.light-mode #bg-layer .bg-radial {
            background: radial-gradient(circle at 30% 20%, rgba(200, 210, 225, 0.5) 0%, transparent 55%),
                radial-gradient(circle at 70% 60%, rgba(180, 195, 215, 0.4) 0%, transparent 55%),
                linear-gradient(180deg, #e6ecf3 0%, #dce3ec 50%, #d5dde6 100%);
        }
        #bg-layer .bg-grid {
            position: absolute;
            inset: 0;
            opacity: 0.03;
            background-image: linear-gradient(rgba(255, 255, 255, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.4) 1px, transparent 1px);
            background-size: 70px 70px;
            mask-image: radial-gradient(ellipse at center, black 25%, transparent 65%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 25%, transparent 65%);
        }

        /* Main container */
        #main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            opacity: 0;
            animation: fadeInMain 0.8s ease forwards;
            animation-delay: 1.2s;
        }
        @keyframes fadeInMain {
            to {
                opacity: 1;
            }
        }

        /* Header */
        #header {
            position: relative;
            z-index: 100;
            flex-shrink: 0;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            background: var(--bg-surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--glass-border);
            transition: all var(--transition);
            gap: 20px;
        }
        #header .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        #header .brand .logo-img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px;
        }
        #header .brand .brand-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        #header .brand .brand-ar {
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.02em;
            line-height: 1.3;
        }
        #header .brand .brand-en {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        #header .header-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        #header .header-date {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.03em;
            white-space: nowrap;
        }
        .btn-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }
        .btn-icon:hover {
            background: var(--glass-hover);
            border-color: var(--gold);
            box-shadow: 0 0 18px rgba(200, 164, 78, 0.18);
        }
        .btn-lang {
            width: auto;
            padding: 0 18px;
            border-radius: 22px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            gap: 6px;
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(200, 164, 78, 0.25);
            transform: scale(0);
            animation: rippleEffect 0.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Content Area */
        #content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 32px 8px;
            overflow: hidden;
            min-height: 0;
        }

        /* Hero */
        #hero {
            text-align: center;
            margin-bottom: 12px;
            animation: fadeSlideUp 0.7s ease forwards;
            animation-delay: 1.4s;
            opacity: 0;
        }
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        #hero .hero-ar {
            font-size: 38px;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 0.05em;
            line-height: 1.2;
        }
        #hero .hero-en {
            font-size: 20px;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        /* Search */
        #search-wrap {
            flex-shrink: 0;
            margin-bottom: 14px;
            position: relative;
            width: 100%;
            max-width: 480px;
            animation: fadeSlideUp 0.7s ease forwards;
            animation-delay: 1.5s;
            opacity: 0;
        }
        #search-input {
            width: 100%;
            padding: 12px 20px 12px 46px;
            border-radius: 30px;
            border: 1.5px solid var(--glass-border);
            background: var(--glass);
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all var(--transition);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            letter-spacing: 0.03em;
        }
        #search-input::placeholder {
            color: var(--text-muted);
        }
        #search-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(200, 164, 78, 0.08);
            background: var(--glass-hover);
        }
        #search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            font-size: 17px;
        }
        body.rtl #search-input {
            padding: 12px 46px 12px 20px;
            text-align: right;
        }
        body.rtl #search-icon {
            left: auto;
            right: 16px;
        }

        /* Airline Grid */
        #airline-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-auto-rows: 1fr;
            gap: 16px;
            width: 100%;
            max-width: 1150px;
            flex: 1;
            align-content: center;
            animation: fadeSlideUp 0.7s ease forwards;
            animation-delay: 1.6s;
            opacity: 0;
        }
        .airline-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: var(--shadow-card);
            min-height: 100px;
            padding: 20px;
        }
        .airline-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, transparent 50%);
            pointer-events: none;
            border-radius: inherit;
        }
        .airline-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(200, 164, 78, 0.4);
            background: var(--glass-hover);
            z-index: 5;
        }
        .airline-card .card-logo {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }
        .airline-card .card-logo svg {
            max-width: 85%;
            max-height: 60%;
            width: auto;
            height: auto;
            transition: transform var(--transition);
        }
        .airline-card:hover .card-logo svg {
            transform: scale(1.04);
        }
        .airline-card.hidden-by-search {
            opacity: 0.12;
            transform: scale(0.9);
            pointer-events: none;
            filter: grayscale(0.7);
            transition: all 0.4s ease;
        }
        .airline-card.match-highlight {
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(200, 164, 78, 0.2);
        }

        /* Footer */
        #footer {
            flex-shrink: 0;
            height: var(--footer-height);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            border-top: 1px solid var(--glass-border);
            background: var(--bg-surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all var(--transition);
        }
        #footer .footer-logo {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        /* Modal */
        #modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            padding: 30px;
        }
        #modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        #modal-panel {
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-3xl);
            padding: 32px 28px 24px;
            max-width: 560px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            transform: translateY(20px) scale(0.96);
            transition: all 0.4s ease;
            text-align: center;
        }
        #modal-overlay.active #modal-panel {
            transform: translateY(0) scale(1);
        }
        #modal-panel .modal-logo {
            width: 130px;
            height: 70px;
            margin: 0 auto 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #modal-panel .modal-logo svg {
            max-width: 100%;
            max-height: 100%;
        }
        #modal-panel .modal-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        #modal-panel .modal-country {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }
        #modal-panel .modal-alliance {
            font-size: 13px;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 14px;
            letter-spacing: 0.04em;
        }
        #modal-panel .modal-third-lang {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 20px;
            background: rgba(200, 164, 78, 0.12);
            color: var(--gold);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            cursor: pointer;
            border: 1px solid rgba(200, 164, 78, 0.25);
            transition: all var(--transition);
        }
        #modal-panel .modal-third-lang:hover {
            background: rgba(200, 164, 78, 0.22);
        }
        #modal-panel .custom-data-area {
            margin-top: 10px;
            border-top: 1px solid var(--glass-border);
            padding-top: 18px;
            text-align: left;
            min-height: 100px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: var(--radius-lg);
            padding: 16px;
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }
        body.rtl #modal-panel .custom-data-area {
            text-align: right;
        }
        #modal-close {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            z-index: 2;
        }
        #modal-close:hover {
            background: #c0392b;
            color: #fff;
            border-color: #c0392b;
        }
        body.rtl #modal-close {
            right: auto;
            left: 14px;
        }

        /* Responsive adjustments for computers and larger tablets */
        @media (max-width: 1200px) {
            #airline-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 14px;
            }
        }
        @media (max-width: 800px) {
            #airline-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
            .airline-card {
                min-height: 80px;
                padding: 14px;
            }
            #hero .hero-ar {
                font-size: 26px;
            }
            #hero .hero-en {
                font-size: 16px;
            }
        }
        @media (max-width: 500px) {
            #airline-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .airline-card {
                min-height: 65px;
                padding: 10px;
                border-radius: var(--radius-lg);
            }
            #header {
                padding: 0 12px;
            }
            #header .brand .brand-ar {
                font-size: 12px;
            }
            #header .brand .brand-en {
                font-size: 8px;
            }
            #header .brand .logo-img {
                width: 36px;
                height: 36px;
            }
            #header .header-date {
                font-size: 12px;
            }
            .btn-lang {
                padding: 0 12px;
                font-size: 10px;
            }
        }
    </style>
</head>

            }, {

            }, {
                id: 'china-eastern',
                name: 'China Eastern Airlines',
                nameAr: 'خطوط شرق الصين الجوية',
                country: 'China',
                countryAr: 'الصين',
                alliance: 'SkyTeam',
                thirdLang: '中文',
                thirdLangCode: 'zh',
                thirdLangNative: '中文',
                logoSVG: `<svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg"><rect width="200" height="80" rx="8" fill="#1a3c6e"/><path d="M28 25 L48 40 L28 55" fill="none" stroke="#c41230" stroke-width="4"/><text x="60" y="48" fill="#fff" font-size="14" font-weight="700" letter-spacing="0.05em" font-family="sans-serif">CHINA EASTERN</text></svg>`
            }, {
                id: 'air-china',
                name: 'Air China',
                nameAr: 'طيران الصين',
                country: 'China',
                countryAr: 'الصين',
                alliance: 'Star Alliance',
                thirdLang: '中文',
                thirdLangCode: 'zh',
                thirdLangNative: '中文',
                logoSVG: `<svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg"><rect width="200" height="80" rx="8" fill="#c41230"/><path d="M30 35 L55 40 L30 45" fill="none" stroke="#ffcc00" stroke-width="4"/><text x="68" y="48" fill="#fff" font-size="17" font-weight="700" letter-spacing="0.07em" font-family="sans-serif">AIR CHINA</text></svg>`
            }];

            // ========== STATE ==========
            let currentLang = 'en';
            let isDarkMode = true;
            let selectedAirline = null;

            // DOM Elements
            const loadingScreen = document.getElementById('loading-screen');
            const airlineGrid = document.getElementById('airline-grid');
            const searchInput = document.getElementById('search-input');
            const headerDate = document.getElementById('header-date');
            const btnLangSwitch = document.getElementById('btn-lang-switch');
            const langIndicator = document.getElementById('lang-indicator');
            const btnTheme = document.getElementById('btn-theme');
            const themeIcon = document.getElementById('theme-icon');
            const modalOverlay = document.getElementById('modal-overlay');
            const modalLogo = document.getElementById('modal-logo');
            const modalName = document.getElementById('modal-name');
            const modalCountry = document.getElementById('modal-country');
            const modalAlliance = document.getElementById('modal-alliance');
            const modalThirdLangBtn = document.getElementById('modal-third-lang-btn');
            const modalClose = document.getElementById('modal-close');
            const body = document.body;

            // ========== INIT ==========
            function init() {
                buildGrid();
                updateDate();
                setInterval(updateDate, 60000); // update date every minute
                bindEvents();
                setTimeout(() => loadingScreen.classList.add('hidden'), 1400);
                applyTheme();
            }

            // ========== BUILD GRID ==========
            function buildGrid() {
                airlineGrid.innerHTML = '';
                airlines.forEach((airline, idx) => {
                    const card = document.createElement('div');
                    card.className = 'airline-card';
                    card.dataset.airlineId = airline.id;
                    card.innerHTML = `<div class="card-logo">${airline.logoSVG}</div>`;
                    card.addEventListener('click', (e) => {
                        addRipple(e, card);
                        openModal(airline);
                    });
                    airlineGrid.appendChild(card);
                });
            }

            // ========== RIPPLE ==========
            function addRipple(e, el) {
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                const rect = el.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                el.appendChild(ripple);
                ripple.addEventListener('animationend', () => ripple.remove());
            }

            // ========== MODAL ==========
            function openModal(airline) {
                selectedAirline = airline;
                modalLogo.innerHTML = airline.logoSVG;
                modalName.textContent = currentLang === 'ar' ? airline.nameAr : airline.name;
                modalCountry.textContent = currentLang === 'ar' ? airline.countryAr : airline.country;
                modalAlliance.textContent = airline.alliance !== 'None' ? airline.alliance : (currentLang ===
                    'ar' ? 'لا يوجد تحالف' : 'No Alliance');
                modalThirdLangBtn.textContent = airline.thirdLangNative + ' (' + airline.thirdLang + ')';
                modalOverlay.classList.add('active');
                body.style.overflow = 'hidden';
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
                body.style.overflow = '';
                selectedAirline = null;
            }

            // ========== LANGUAGE ==========
            function switchLanguage() {
                currentLang = currentLang === 'en' ? 'ar' : 'en';
                applyLanguage();
                updateDate();
                if (selectedAirline) {
                    modalName.textContent = currentLang === 'ar' ? selectedAirline.nameAr : selectedAirline.name;
                    modalCountry.textContent = currentLang === 'ar' ? selectedAirline.countryAr : selectedAirline
                        .country;
                    modalAlliance.textContent = selectedAirline.alliance !== 'None' ? selectedAirline.alliance : (
                        currentLang === 'ar' ? 'لا يوجد تحالف' : 'No Alliance');
                }
                searchInput.placeholder = currentLang === 'ar' ? 'ابحث عن شركات الطيران...' : 'Search airlines...';
            }

            function applyLanguage() {
                if (currentLang === 'ar') {
                    body.classList.add('rtl');
                    body.setAttribute('dir', 'rtl');
                    langIndicator.textContent = 'EN';
                } else {
                    body.classList.remove('rtl');
                    body.setAttribute('dir', 'ltr');
                    langIndicator.textContent = 'AR';
                }
            }

            // ========== THEME ==========
            function toggleTheme() {
                isDarkMode = !isDarkMode;
                applyTheme();
            }

            function applyTheme() {
                if (isDarkMode) {
                    body.classList.remove('light-mode');
                    body.classList.add('dark-mode');
                    themeIcon.textContent = '☀️';
                } else {
                    body.classList.add('light-mode');
                    body.classList.remove('dark-mode');
                    themeIcon.textContent = '🌙';
                }
            }

            // ========== DATE (no clock) ==========
            function updateDate() {
                const now = new Date();
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                headerDate.textContent = now.toLocaleDateString(currentLang === 'ar' ? 'ar-EG' : 'en-US', options);
            }

            // ========== SEARCH ==========
            function handleSearch() {
                const query = searchInput.value.toLowerCase().trim();
                const cards = airlineGrid.querySelectorAll('.airline-card');
                cards.forEach(card => {
                    const airline = airlines.find(a => a.id === card.dataset.airlineId);
                    if (!airline) return;
                    const match = query === '' ||
                        airline.name.toLowerCase().includes(query) ||
                        airline.nameAr.includes(query) ||
                        airline.country.toLowerCase().includes(query) ||
                        airline.countryAr.includes(query) ||
                        (airline.alliance && airline.alliance.toLowerCase().includes(query));
                    if (!match && query !== '') {
                        card.classList.add('hidden-by-search');
                        card.classList.remove('match-highlight');
                    } else {
                        card.classList.remove('hidden-by-search');
                        card.classList.toggle('match-highlight', query !== '' && match);
                    }
                });
            }

            // ========== EVENTS ==========
            function bindEvents() {
                btnLangSwitch.addEventListener('click', (e) => {
                    addRipple(e, btnLangSwitch);
                    switchLanguage();
                });
                btnTheme.addEventListener('click', (e) => {
                    addRipple(e, btnTheme);
                    toggleTheme();
                });
                modalClose.addEventListener('click', closeModal);
                modalOverlay.addEventListener('click', (e) => {
                    if (e.target === modalOverlay) closeModal();
                });
                searchInput.addEventListener('input', handleSearch);
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal();
                });
                modalThirdLangBtn.addEventListener('click', () => {
                    if (selectedAirline) {
                        alert('Third language: ' + selectedAirline.thirdLangNative);
                    }
                });
            }

            init();
        })();
    </script>
